services:
  satisfactory-server:
    image: wolveix/satisfactory-server:latest
    container_name: satisfactory-server
    hostname: satisfactory-server
    restart: unless-stopped
    stop_grace_period: 2m

    ports:
      - "7777:7777/tcp"
      - "7777:7777/udp"
      - "8888:8888/tcp"

    volumes:
      - /srv/satisfactory:/config

    environment:
      PUID: "1000"
      PGID: "1000"
      MAXPLAYERS: "4"
      AUTOSAVENUM: "10"
      MAXTICKRATE: "30"
      STEAMBETA: "false"
      SKIPUPDATE: "false"

    mem_reservation: 4g
    mem_limit: 7g